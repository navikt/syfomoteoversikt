version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10

  - package-ecosystem: npm  # also handles pnpm via pnpm-lock.yaml
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
